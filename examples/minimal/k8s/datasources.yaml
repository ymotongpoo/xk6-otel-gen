apiVersion: 1

datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: true
    jsonData:
      serviceMap:
        datasourceUid: prometheus
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        # trace_id arrives as Loki structured metadata (not a stream label),
        # so "Logs for this span" must filter it with a line/label filter.
        # Without the custom query Grafana degrades to {service_name="..."}
        # and returns the whole service's logs for the time window instead
        # of the single span's. Promoting trace_id to a stream label would
        # explode Loki cardinality, so we filter on structured metadata here.
        filterByTraceID: false
        customQuery: true
        query: '{service_name="${__tags["service.name"]}"} | trace_id = "${__trace.traceId}"'
        tags:
          - service.name
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100

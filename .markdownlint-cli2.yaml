# markdownlint-cli2 configuration
# https://github.com/DavidAnson/markdownlint-cli2
# Run: npx markdownlint-cli2 "**/*.md"
# Fix: npx markdownlint-cli2 --fix "**/*.md"

config:
  # ============================================================
  # PERMANENTLY DISABLED — conflict with project documentation style
  # ============================================================

  # Line-length — long URLs, tables, code examples, ASCII diagrams
  MD013: false

  # Inline HTML — <img> tags for screenshots/badges in README
  MD033: false

  # Duplicate headings — section names repeat across platform guides
  MD024: false

  # Emphasis as heading — bold text used as sub-labels in lists
  MD036: false

  # Table pipe alignment — the authored docs use compact (unaligned) pipe
  # tables throughout; enforcing vertical pipe alignment would churn every
  # table for no rendered difference. Consistent with the other disabled
  # style rules above.
  MD060: false

# Ignore generated/vendored/test fixture files
ignores:
  - "node_modules/**"
  - ".claude/**"
  - "scripts/aidlc-evaluator/test_cases/**"
  # Hugo + Hextra documentation source. These pages use Hugo front matter and
  # Hextra shortcodes (e.g. {{< callout >}}, {{< relref >}}) that are not
  # CommonMark; they are authored for the docs site, not markdownlint. The
  # rendered site is built and verified by .github/workflows/docs.yml.
  - "docs/content/**"
  # AI-DLC process artifacts: rule details, generated stage documents, and the
  # shared agent memory. These are authored to the AI-DLC workflow's own
  # conventions, not CommonMark/markdownlint, and are not user-facing docs.
  - ".agent-memory/**"
  - ".aidlc-rule-details/**"
  - "aidlc-docs/**"
  # Agent-instruction files maintained to the AI-DLC workflow's heading/list
  # conventions (e.g. multiple top-level "# PHASE" dividers), not CommonMark.
  - "CLAUDE.md"
  - "AGENTS.md"
  # CHANGELOG.md is auto-generated by git-cliff (cliff.toml controls its format).
  # git-cliff postprocessors run per-body so inter-body spacing and trailing
  # whitespace cannot be fully controlled via template alone.
  - "CHANGELOG.md"

name: Bug Report
description: Report incorrect or unexpected behavior in xk6-otel-gen
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. This repository does **not** accept pull requests — the
        maintainer reads issues directly and implements the fix. Please fill in every required
        field so the problem can be reproduced from your report alone. A minimal, self-contained
        reproduction (topology YAML / journey config / k6 script + exact command) is the single
        most important thing you can provide.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and this has not already been reported.
          required: true
        - label: I can reproduce this with the latest `main` (or I state which version below).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What goes wrong, and where (topology parsing, journey execution, fault injection, OTLP export, k6 output, …).
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the extension is involved? Select all that apply.
      multiple: true
      options:
        - Topology DSL / YAML parsing (topology)
        - Journey execution (journey)
        - Fault injection (error_rate_override, latency_inflation, disconnect, crash)
        - Synthetic telemetry generation (synth)
        - OTLP exporter — gRPC/HTTP (exporter)
        - k6 output `otel-gen` (k6output)
        - JS module API / k6otelgen
        - Examples (minimal, astroshop)
        - Build / xk6 / CI
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: signals
    attributes:
      label: Affected signals
      description: Which OpenTelemetry signals are affected?
      multiple: true
      options:
        - Traces
        - Metrics
        - Logs
        - Not signal-specific
    validations:
      required: true

  - type: textarea
    id: repro-config
    attributes:
      label: Minimal reproduction (topology / journey / script)
      description: >-
        Paste the smallest topology YAML, journey config, and/or k6 script that triggers the bug.
        Trim it to the minimum needed to reproduce.
      render: yaml
      placeholder: |
        # topology.yaml (trimmed)
        services:
          frontend:
            operations:
              - name: get_index
        journeys:
          checkout:
            weight: 1.0
            steps:
              - service: frontend
                operation: get_index
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact command(s) run
      description: The full `xk6 build` and `k6 run` (or output) command line you used.
      render: shell
      placeholder: |
        xk6 build --with github.com/ymotongpoo/xk6-otel-gen=.
        ./k6 run examples/minimal/script.js --out otel-gen=endpoint=localhost:4317,protocol=grpc,insecure=true
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen (e.g., which spans/metrics/logs you expected to see).
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages, panics, or the malformed telemetry you observed.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste k6 output, Collector logs, or exporter errors. This is automatically formatted as code.
      render: text

  - type: input
    id: version
    attributes:
      label: xk6-otel-gen version / commit
      description: Release tag (e.g. v0.2.0) or the git commit hash you built from.
      placeholder: e.g., v0.2.0 or abc1234
    validations:
      required: true

  - type: input
    id: k6-version
    attributes:
      label: k6 / xk6 version
      description: Output of `./k6 version` and the xk6 version used to build.
      placeholder: e.g., k6 v0.54.0, xk6 v0.13.0

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version` (the project requires Go 1.25+).
      placeholder: e.g., go1.25.0

  - type: input
    id: otlp
    attributes:
      label: OTLP egress setup
      description: Protocol, endpoint, and collector/backend you exported to.
      placeholder: e.g., OTLP/gRPC to localhost:4317, OpenTelemetry Collector → Tempo/Prometheus/Loki

  - type: input
    id: os
    attributes:
      label: OS / architecture
      placeholder: e.g., Linux x86_64, macOS arm64

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that helps — a hypothesis about the cause, a pointer to the suspected file, screenshots from Grafana, etc.

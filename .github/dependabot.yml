# Dependabot version updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Note: The ClamAV service container image in security-scanners.yml is pinned
# by sha256 digest and is NOT covered by any Dependabot ecosystem. That digest
# must be updated manually (monthly cadence). See:
# docs/ADMINISTRATIVE_GUIDE.md → Updating Pinned Versions → How to update the ClamAV image digest

version: 2
updates:
  # Go modules — project runtime and test dependencies
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      otel:
        patterns:
          - "go.opentelemetry.io/*"
          - "go.opentelemetry.io/proto/*"
      k6:
        patterns:
          - "go.k6.io/*"
          - "github.com/grafana/sobek"

  # GitHub Actions — SHA-pinned actions across all workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  # Pre-commit hooks — .pre-commit-config.yaml rev pins
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Docker — minimal example observability images
  - package-ecosystem: "docker"
    directory: "/examples/minimal/k8s"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Docker — astroshop example observability images
  - package-ecosystem: "docker"
    directory: "/examples/astroshop/k8s"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"

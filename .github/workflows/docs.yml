name: Deploy Docs

# Build the Hugo + Hextra documentation site under docs/ and publish it to
# GitHub Pages. Aligned with the repo policy of running CI only on main:
# the site is updated when dev is merged into main. The Pages "Source" must be
# set to "GitHub Actions" in repository Settings for this workflow to deploy.
on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions: {}

# Only one Pages deployment at a time; do not cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: "0.163.1"

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # enableGitInfo needs full history for lastmod
      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true # Hextra requires the Hugo extended edition
      - id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Resolve Hugo modules
        run: hugo mod get -u
      - name: Build
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url || 'https://ymotongpoo.github.io/xk6-otel-gen/' }}"
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/public

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from this workflow
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

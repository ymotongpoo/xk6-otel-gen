name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-build-test:
    name: Go Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Test (race)
        run: go test -race -count=1 ./...

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd #v23.2.0
        with:
          globs: "**/*.md"
      - name: Check multiple-choice options are blank-line separated (issue #246)
        run: |
          # Multiple-choice options like "A) ..." on consecutive lines without
          # a blank-line separator collapse into a single paragraph in strict
          # CommonMark renderers (IntelliJ/PyCharm preview). Scope mirrors the
          # markdownlint ignores in .markdownlint-cli2.yaml.
          matches=$(find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.claude/*' \
            -not -path './.git/*' \
            -not -name 'CHANGELOG.md' \
            -print | xargs awk '
              FNR == 1 { prev_is_option = 0 }
              /^[A-Z]\) / && prev_is_option { print FILENAME ":" FNR ": " $0 }
              { prev_is_option = /^[A-Z]\) / }
            ')
          if [ -n "$matches" ]; then
            echo "Found multiple-choice options on consecutive lines without blank-line separators."
            echo "Add a blank line between each option so CommonMark renderers display them on separate lines."
            echo "$matches"
            exit 1
          fi

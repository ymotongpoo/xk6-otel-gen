# Tag Release
#
# Automatically creates a version tag when a release PR is merged.
# Triggered by pull_request close events; only runs when:
#   - The PR was actually merged (not just closed)
#   - The branch name starts with "release/v"
#
# After tagging, dispatches release.yml to create the draft release. Uses
# workflow_dispatch (not tag push) because tags created with GITHUB_TOKEN
# don't trigger other workflows.

name: Tag Release

on:
  pull_request:
    types: [closed]

permissions: {}

jobs:
  tag:
    name: Create Release Tag
    permissions:
      contents: write
      actions: write
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
        run: |
          TAG="${BRANCH#release/}"
          echo "Creating tag $TAG on merge commit $SHA"

          # Verify tag doesn't already exist
          if gh api "repos/$REPO/git/refs/tags/$TAG" &>/dev/null; then
            echo "ERROR: Tag $TAG already exists"
            exit 1
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "$TAG" "$SHA" -m "Release $TAG"
          git push origin "$TAG"

          echo "Tag $TAG created on $SHA"

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          TAG="${BRANCH#release/}"
          echo "Dispatching release.yml on ref $TAG"
          gh workflow run release.yml --ref "$TAG" --repo "$REPO"

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Namespace}} — Topology DAG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #f5f5f5;
    }
    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      height: 60px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 18px;
      font-weight: 600;
      white-space: nowrap;
    }
    #search {
      padding: 6px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      width: 220px;
    }
    #legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 11px;
      color: #555;
      margin-left: auto;
    }
    .legend-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend-item::before {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
    .legend-app::before { background: #4A90D9; border-radius: 3px; }
    .legend-db::before { background: #E8A838; border-radius: 50%; }
    .legend-cache::before { background: #50C878; transform: rotate(45deg); width: 10px; height: 10px; }
    .legend-queue::before { background: #9B59B6; }
    .legend-ext::before { background: #E74C3C; }
    .legend-http::before { background: transparent; width: 20px; height: 0; border-top: 2px solid #333; border-radius: 0; }
    .legend-grpc::before { background: transparent; width: 20px; height: 0; border-top: 2px dashed #0066CC; border-radius: 0; }
    .legend-msg::before { background: transparent; width: 20px; height: 0; border-top: 2px dotted #9B59B6; border-radius: 0; }
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #sidebar-left {
      width: 250px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 12px;
      overflow-y: auto;
    }
    #sidebar-left h3, #sidebar-right h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 10px;
    }
    .journey-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 6px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s;
    }
    .journey-btn:hover { background: #f0f0f0; }
    .journey-btn.active {
      border-color: #4A90D9;
      background: #eef4fc;
    }
    #cy {
      flex: 1;
      height: calc(100vh - 60px);
      background: #fafafa;
    }
    #sidebar-right {
      width: 280px;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid #ddd;
      padding: 12px;
      overflow-y: auto;
    }
    .fault-item {
      margin-bottom: 12px;
      padding: 8px;
      border: 1px solid #eee;
      border-radius: 6px;
    }
    .fault-item label {
      font-size: 12px;
      cursor: pointer;
      margin-left: 6px;
    }
    .fault-item input:checked + label {
      color: #c0392b;
    }
    #tooltip {
      position: absolute;
      pointer-events: none;
      display: none;
      background: rgba(30, 30, 30, 0.92);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      max-width: 320px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>{{.Namespace}}</h1>
    <input id="search" type="text" placeholder="Search services..." />
    <div id="legend">
      <div class="legend-group">
        <span class="legend-item legend-app">application</span>
        <span class="legend-item legend-db">database</span>
        <span class="legend-item legend-cache">cache</span>
        <span class="legend-item legend-queue">queue</span>
        <span class="legend-item legend-ext">external_api</span>
      </div>
      <div class="legend-group">
        <span class="legend-item legend-http">http</span>
        <span class="legend-item legend-grpc">grpc</span>
        <span class="legend-item legend-msg">messaging</span>
      </div>
    </div>
  </div>
  <div id="main">
    <div id="sidebar-left">
      <h3>Journeys</h3>
      <div id="journey-buttons"></div>
    </div>
    <div id="cy"></div>
    <div id="sidebar-right">
      <h3>Faults</h3>
      <div id="fault-toggles"></div>
    </div>
  </div>
  <div id="tooltip"></div>

  <script>{{.CytoscapeJS}}</script>
  <script>{{.DagreJS}}</script>
  <script>{{.CytoscapeDagreJS}}</script>
  <script>
    const TOPOLOGY = {{.TopologyJSON}};

    cytoscape.use(cytoscapeDagre);

    const elements = [];

    TOPOLOGY.nodes.forEach(n => {
      elements.push({
        group: 'nodes',
        data: {
          id: n.id,
          label: n.id,
          kind: n.kind,
          replicas: n.replicas,
          language: n.language,
          framework: n.framework,
          version: n.version,
          operations: n.operations
        }
      });
    });

    TOPOLOGY.edges.forEach(e => {
      elements.push({
        group: 'edges',
        data: {
          id: e.id,
          source: e.source,
          target: e.target,
          protocol: e.protocol,
          fromOp: e.fromOp,
          toOp: e.toOp,
          latencyP50: e.latencyP50,
          latencyP95: e.latencyP95,
          errorRate: e.errorRate,
          retries: e.retries
        }
      });
    });

    const style = [
      {
        selector: 'node',
        style: {
          'label': 'data(label)',
          'text-valign': 'center',
          'text-halign': 'center',
          'font-size': '11px',
          'font-family': 'system-ui, sans-serif',
          'width': 'label',
          'height': 'label',
          'padding': '12px',
          'border-width': 2,
          'border-color': '#ccc',
          'text-wrap': 'wrap'
        }
      },
      {
        selector: 'node[kind="application"]',
        style: {
          'background-color': '#4A90D9',
          'color': '#fff',
          'shape': 'round-rectangle',
          'border-color': '#3570A8'
        }
      },
      {
        selector: 'node[kind="database"]',
        style: {
          'background-color': '#E8A838',
          'color': '#fff',
          'shape': 'barrel',
          'border-color': '#C08820'
        }
      },
      {
        selector: 'node[kind="cache"]',
        style: {
          'background-color': '#50C878',
          'color': '#fff',
          'shape': 'diamond',
          'border-color': '#38A858'
        }
      },
      {
        selector: 'node[kind="queue"]',
        style: {
          'background-color': '#9B59B6',
          'color': '#fff',
          'shape': 'round-pentagon',
          'border-color': '#7D3C98'
        }
      },
      {
        selector: 'node[kind="external_api"]',
        style: {
          'background-color': '#E74C3C',
          'color': '#fff',
          'shape': 'octagon',
          'border-color': '#C0392B'
        }
      },
      {
        selector: 'edge',
        style: {
          'curve-style': 'bezier',
          'target-arrow-shape': 'triangle',
          'target-arrow-color': '#999',
          'line-color': '#999',
          'width': 2,
          'font-size': '9px',
          'text-rotation': 'autorotate'
        }
      },
      {
        selector: 'edge[protocol="http"]',
        style: {
          'line-color': '#333',
          'target-arrow-color': '#333',
          'line-style': 'solid'
        }
      },
      {
        selector: 'edge[protocol="grpc"]',
        style: {
          'line-color': '#0066CC',
          'target-arrow-color': '#0066CC',
          'line-style': 'dashed'
        }
      },
      {
        selector: 'edge[protocol="messaging"]',
        style: {
          'line-color': '#9B59B6',
          'target-arrow-color': '#9B59B6',
          'line-style': 'dotted'
        }
      },
      {
        selector: '.dimmed',
        style: { 'opacity': 0.15 }
      },
      {
        selector: '.highlighted',
        style: { 'opacity': 1 }
      },
      {
        selector: '.fault-target',
        style: {
          'border-color': '#E74C3C',
          'border-width': 4,
          'border-style': 'double'
        }
      },
      {
        selector: 'edge.fault-target',
        style: {
          'line-color': '#E74C3C',
          'target-arrow-color': '#E74C3C',
          'width': 4
        }
      },
      {
        selector: '.search-match',
        style: {
          'border-color': '#FFD700',
          'border-width': 4
        }
      }
    ];

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: elements,
      layout: {
        name: 'dagre',
        rankDir: 'TB',
        nodeSep: 60,
        rankSep: 80,
        edgeSep: 20
      },
      style: style,
      wheelSensitivity: 0.2
    });

    const journeyPanel = document.getElementById('journey-buttons');

    const allBtn = document.createElement('button');
    allBtn.textContent = 'All';
    allBtn.className = 'journey-btn active';
    allBtn.addEventListener('click', () => {
      cy.elements().removeClass('dimmed highlighted');
      document.querySelectorAll('.journey-btn').forEach(b => b.classList.remove('active'));
      allBtn.classList.add('active');
    });
    journeyPanel.appendChild(allBtn);

    TOPOLOGY.journeys.forEach(j => {
      const btn = document.createElement('button');
      btn.textContent = `${j.name} (${Math.round(j.weight * 100)}%)`;
      btn.className = 'journey-btn';
      btn.addEventListener('click', () => {
        cy.elements().addClass('dimmed').removeClass('highlighted');

        const nodeSelector = j.reachableNodes.map(id => `node[id="${id}"]`).join(', ');
        if (nodeSelector) cy.elements(nodeSelector).removeClass('dimmed').addClass('highlighted');

        const edgeSelector = j.reachableEdges.map(id => `edge[id="${id}"]`).join(', ');
        if (edgeSelector) cy.elements(edgeSelector).removeClass('dimmed').addClass('highlighted');

        document.querySelectorAll('.journey-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
      journeyPanel.appendChild(btn);
    });

    const faultPanel = document.getElementById('fault-toggles');

    function faultTargetSelector(f) {
      switch (f.targetKind) {
        case 'node':
          return `node[id="${f.targetID}"]`;
        case 'operation': {
          const svc = f.targetID.split('.')[0];
          return `node[id="${svc}"]`;
        }
        case 'edge':
          return `edge[id="${f.targetID}"]`;
        default:
          return null;
      }
    }

    function refreshFaultOverlay() {
      cy.elements().removeClass('fault-target');
      TOPOLOGY.faults.forEach((f, i) => {
        const cb = document.getElementById(`fault-${i}`);
        if (cb && cb.checked) {
          const sel = faultTargetSelector(f);
          if (sel) cy.elements(sel).addClass('fault-target');
        }
      });
    }

    function createScheduleSVG(schedule) {
      const width = 200, height = 30, padding = 4;
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', width);
      svg.setAttribute('height', height);
      svg.style.display = 'block';
      svg.style.marginTop = '4px';

      if (schedule.length === 0) return svg;

      const maxAt = Math.max(...schedule.map(p => p.atSeconds), 1);
      const plotW = width - padding * 2;
      const plotH = height - padding * 2;

      let pathD = '';
      schedule.forEach((p, i) => {
        const x = padding + (p.atSeconds / maxAt) * plotW;
        const y = padding + plotH - p.intensity * plotH;
        pathD += (i === 0 ? 'M' : 'L') + `${x},${y}`;
      });

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', pathD);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', '#E74C3C');
      path.setAttribute('stroke-width', '2');
      svg.appendChild(path);

      return svg;
    }

    TOPOLOGY.faults.forEach((f, i) => {
      const container = document.createElement('div');
      container.className = 'fault-item';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.id = `fault-${i}`;

      const label = document.createElement('label');
      label.htmlFor = `fault-${i}`;
      label.innerHTML = `<strong>${f.faultKind}</strong><br/>
        <small>${f.targetKind}: ${f.targetID}</small>`;

      if (f.schedule && f.schedule.length > 0) {
        const svg = createScheduleSVG(f.schedule);
        container.appendChild(svg);
      }

      checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
          const selector = faultTargetSelector(f);
          if (selector) cy.elements(selector).addClass('fault-target');
        } else {
          refreshFaultOverlay();
        }
      });

      container.appendChild(checkbox);
      container.appendChild(label);
      faultPanel.appendChild(container);
    });

    const tooltip = document.getElementById('tooltip');

    cy.on('mouseover', 'node', (evt) => {
      const n = evt.target.data();
      let html = `<strong>${n.id}</strong><br/>`;
      html += `Kind: ${n.kind}<br/>`;
      html += `Language: ${n.language} / ${n.framework}<br/>`;
      html += `Version: ${n.version}<br/>`;
      html += `Replicas: ${n.replicas}<br/>`;
      if (n.operations && n.operations.length > 0) {
        html += `Operations: ${n.operations.map(o => o.name).join(', ')}`;
      }
      tooltip.innerHTML = html;
      tooltip.style.display = 'block';
    });

    cy.on('mouseover', 'edge', (evt) => {
      const e = evt.target.data();
      let html = `<strong>${e.fromOp} → ${e.toOp}</strong><br/>`;
      html += `Protocol: ${e.protocol}<br/>`;
      if (e.latencyP50) html += `Latency: p50=${e.latencyP50}, p95=${e.latencyP95}<br/>`;
      if (e.errorRate) html += `Error rate: ${(e.errorRate * 100).toFixed(1)}%<br/>`;
      if (e.retries) html += `Retries: ${e.retries}`;
      tooltip.innerHTML = html;
      tooltip.style.display = 'block';
    });

    cy.on('mouseout', () => {
      tooltip.style.display = 'none';
    });

    cy.on('mousemove', (evt) => {
      tooltip.style.left = (evt.originalEvent.clientX + 12) + 'px';
      tooltip.style.top = (evt.originalEvent.clientY + 12) + 'px';
    });

    const searchInput = document.getElementById('search');
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();
      cy.elements().removeClass('search-match');
      if (query) {
        cy.nodes().forEach(n => {
          if (n.data('id').toLowerCase().includes(query)) {
            n.addClass('search-match');
          }
        });
      }
    });
  </script>
</body>
</html>

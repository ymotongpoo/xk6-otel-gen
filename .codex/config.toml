# Codex CLI 設定 — xk6-otel-gen
#
# 本ファイルはプロジェクトローカル設定です。グローバル設定 (~/.codex/config.toml)
# とマージされ、こちらが優先されます (Codex CLI 0.20 以降の挙動)。
#
# モデル名やキー名は Codex CLI のバージョンによって変わる可能性があります。
# 起動時に未対応キーで警告が出る場合は、お使いのバージョンに合わせて調整してください。

# ----------------------------------------------------------------------------
# Model selection
# ----------------------------------------------------------------------------
# 本プロジェクトでは gpt-5.5 (xhigh reasoning) を既定モデルとして使う。
model = "gpt-5.5"
model_reasoning_effort = "xhigh"

# ----------------------------------------------------------------------------
# Sandbox / approval policy
# ----------------------------------------------------------------------------
# sandbox_mode = "danger-full-access" を選択。
#
# 経緯: 当初 "workspace-write" を採用したが、Codex CLI 0.137 では
# workspace-write モードが .git/ ディレクトリを read-only に固定するため、
# phase-boundary commit (mandatory by CLAUDE.md "Conventional Commits at
# Stage Boundaries") が "Unable to create .git/index.lock" で失敗した
# (U1 Phase 0 の codex run、commit bb9e323 直後)。
# Codex の `--add-dir` でも .git の write 許可ができず、現実解として
# danger-full-access を採用。利用者は既に自律実行の権限を明示的に
# 付与しており (network=enabled も同じ判断)、network=disabled の
# 既存制約は本 config では明示しない。
#
# 安全担保:
#   1. 利用者が監視可能な前台 / 後台で実行
#   2. read_only_paths (下記) で設計ドキュメント等への書き込みは禁止 (best-effort)
#   3. プロンプト側で「aidlc-docs/** を編集しない」ルールを明示
#   4. push しない (commit のみ)、CI を介さず利用者がレビュー後に push
approval_policy = "never"
sandbox_mode = "danger-full-access"

# ----------------------------------------------------------------------------
# Project-specific guardrails
# ----------------------------------------------------------------------------
# ネットワークアクセスは ENABLED。長時間自律実行で `go get`、`go mod tidy`、
# Go module proxy 経由のアーティファクト取得など Codex が必要とする操作を
# ブロックしないため。利用者がこの自律性を明示的に付与している。
[sandbox]
network = "enabled"

# 設計ドキュメントの書き換えを禁止する read-only パス指定 (拡張で対応する場合)
# 現行 Codex CLI が対応していない可能性があるが、ポリシーを明示しておく。
read_only_paths = [
  "aidlc-docs/",
  ".aidlc-rule-details/",
  "CLAUDE.md",
  "AGENTS.md",
]

# ----------------------------------------------------------------------------
# Notes
# ----------------------------------------------------------------------------
# - 実装エージェントの契約は AGENTS.md を Single Source of Truth とする
# - "gpt-5.5 xhigh" を指定したい場合、お使いの Codex CLI のリリースノートで
#   xhigh プロファイルの正式キー名を確認の上、`model` または
#   `model_reasoning_effort` を上書きしてください
